<!doctype html>
<html lang="en">
  <head>
<meta charset="UTF-8"  />
<meta
  http-equiv="Content-Security-Policy"
  content="
    default-src 'self';

    script-src
      'self'
      https://platform.twitter.com
      https://connect.facebook.net
      https://www.instagram.com;

    frame-src
      https://platform.twitter.com
      https://syndication.twitter.com
      https://pbs.twimg.com
      https://ton.twimg.com
      https://www.facebook.com
      https://www.instagram.com
      https://scontent.cdninstagram.com
      https://www.youtube.com;

    img-src
      'self'
      data:
      blob:
      https://rcpcmjrahhzayqxexpkv.supabase.co
      https://pbs.twimg.com
      https://ton.twimg.com
      https://www.instagram.com
      https://scontent.cdninstagram.com
      https://*.ytimg.com;

    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;

    font-src 'self' data: https://fonts.gstatic.com;

    connect-src
      'self'
      https://rcpcmjrahhzayqxexpkv.supabase.co
      wss://rcpcmjrahhzayqxexpkv.supabase.co
      https://www.googleapis.com
      https://youtube.googleapis.com
      https://www.youtube.com
      https://noembed.com;

    media-src 'self' data: blob:;
  "
/>





    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <!-- viewport-fit=cover lets the site use the full screen on
         notched iPhones; maximum-scale=5 keeps pinch-zoom working
         (some Android browsers cap user-scalable=no). -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover"
    />
    <!-- Tells the browser the site is colour-aware: prevents Chrome
         on Android from inverting colours in dark mode. -->
    <meta name="color-scheme" content="light" />
    <!-- Theme colour shown in the iOS Safari status bar + Android
         address bar. Matches the YSRCP brand blue. -->
    <meta name="theme-color" content="#003366" />
    <!-- Apple PWA support so adding to home screen works on iOS. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="YSRCP NRI Wing" />
    <!-- Microsoft tile colour for Windows pinned tiles. -->
    <meta name="msapplication-TileColor" content="#003366" />
    <!-- format-detection=no stops iOS from auto-styling phone numbers
         as blue tappable links inside non-phone contexts (was making
         random digit strings look like mobile numbers). -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Inter font: preconnect kicks off the TLS handshake in parallel with HTML
         parsing; the stylesheet link triggers the font fetch immediately instead
         of waiting for the CSS @import in index.css to be discovered. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />

    <title>YSRCP NRI Wing Portal</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
