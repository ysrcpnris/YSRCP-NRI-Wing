<html lang="en">

<meta charset="UTF-8"  />
<meta
  http-equiv="Content-Security-Policy"
  content="
    default-src 'self';

    script-src
      'self'
      https://platform.twitter.com
      https://connect.facebook.net
      https://www.instagram.com;

    frame-src
      https://platform.twitter.com
      https://syndication.twitter.com

      https://ton.twimg.com
      https://www.facebook.com
      https://www.instagram.com
      https://scontent.cdninstagram.com
      https://www.youtube.com;

    img-src
      'self'
      data:
      blob:
      https://rcpcmjrahhzayqxexpkv.supabase.co
      https://pbs.twimg.com
      https://ton.twimg.com
      https://www.instagram.com
      https://scontent.cdninstagram.com
      https://*.ytimg.com;

    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;

    font-src 'self' data: https://fonts.gstatic.com;

    connect-src
      'self'
      https://rcpcmjrahhzayqxexpkv.supabase.co
      wss://rcpcmjrahhzayqxexpkv.supabase.co
      https://www.googleapis.com
      https://youtube.googleapis.com;

    media-src 'self' data: blob:;
  "
/>





    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Inter font: preconnect kicks off the TLS handshake in parallel with HTML
         parsing; the stylesheet link triggers the font fetch immediately instead
         of waiting for the CSS @import in index.css to be discovered. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    />

    <title>YSRCP NRI Wing Portal</title>
